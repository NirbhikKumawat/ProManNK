version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}


nfpms:
  - vendor: Nirbhik Kumawat
    homepage: https://github.com/NirbhikKumawat/ProManNK
    maintainer: Nirbhik Kumawat <nirbhikkumawat@gmail.com>
    description: A visual, terminal-based process orchestrator.
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin

checksum:
  name_template: 'checksums.txt'


release:
  github:
    owner: NirbhikKumawat
    name: ProManNK